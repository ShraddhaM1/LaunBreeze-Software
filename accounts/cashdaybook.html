<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cash Book</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f3f3f3;
}

/* HEADER */
.header{
    background:#3b78a8;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:20px;
}

.date-picker{
    background:white;
    padding:6px 12px;
    border-radius:4px;
    color:#333;
    font-size:14px;
}

/* CONTENT AREA */
.content{
    padding:30px;
}

/* SUMMARY CARDS */
.summary{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    padding:20px;
    flex:1;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card h4{
    margin-bottom:10px;
    color:#666;
}

.card .amount{
    font-size:22px;
    font-weight:bold;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:6px;
    overflow:hidden;
}

th{
    background:#7a7a7a;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f9f9f9;
}
</style>
</head>

<body>

<div class="header">
    <div>Cash Book</div>
    <div class="date-picker">
        📅 22 Feb 2026 - 28 Feb 2026
    </div>
</div>

<div class="content">

    <!-- SUMMARY SECTION -->
    <div class="summary">
        <div class="card">
            <h4>Total Credit</h4>
            <div class="amount">₹ 0.00</div>
        </div>

        <div class="card">
            <h4>Total Debit</h4>
            <div class="amount">₹ 0.00</div>
        </div>

        <div class="card">
            <h4>Balance</h4>
            <div class="amount">₹ 0.00</div>
        </div>
    </div>

    <!-- TABLE SECTION -->
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Credit</th>
                <th>Debit</th>
                <th>Balance</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="5" style="text-align:center; padding:30px;">
                    No transactions available for selected date range.
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
