<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Send Promotional SMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f3f3f3;
}

/* HEADER */
.header {
    background: #3e7cb1;
    color: white;
    padding: 15px 20px;
    font-size: 18px;
}

/* MAIN CONTAINER */
.container {
    width: 80%;
    margin: 40px auto;
}

/* RADIO SECTION */
.radio-group {
    margin-bottom: 25px;
}

.radio-group label {
    display: block;
    margin-bottom: 10px;
    font-size: 18px;
}

/* MESSAGE SECTION */
.message-section {
    margin-top: 20px;
}

.message-section label {
    font-size: 18px;
}

textarea {
    width: 100%;
    height: 150px;
    margin-top: 10px;
    padding: 12px;
    font-size: 15px;
    border: 1px solid #4aa3df;
    border-radius: 6px;
    outline: none;
}

textarea:focus {
    box-shadow: 0 0 8px rgba(74,163,223,0.4);
}

/* COUNTER */
.counter {
    margin-top: 8px;
    font-size: 16px;
    color: #333;
}

/* BUTTON */
.button-section {
    margin-top: 25px;
}

.send-btn {
    background: #cfcfcf;
    border: 1px solid #aaa;
    padding: 12px 40px;
    font-size: 18px;
    border-radius: 6px;
    cursor: pointer;
}

.send-btn:hover {
    background: #bdbdbd;
}
</style>
</head>

<body>

<div class="header">
Send Promotional SMS: Grow your business by reaching out to your customers with latest offers and promotional schemes.
</div>

<div class="container">

    <div class="radio-group">
        <label>
            <input type="radio" name="smsType" checked>
            Send to all customers (Total number of customers: 8)
        </label>

        <label>
            <input type="radio" name="smsType">
            Send to selected customers
        </label>
    </div>

    <div class="message-section">
        <label>Message <span style="color:red">*</span></label>

        <textarea id="smsMessage"
                  placeholder="Type your text message here (up to max 500 characters)"
                  maxlength="500"></textarea>

        <div class="counter">
            <span id="charRemaining">500</span> characters remaining,
            <span id="smsCount">0</span> message(s).
        </div>
    </div>

    <div class="button-section">
        <button class="send-btn">Send Now</button>
    </div>

</div>

<script>
const textarea = document.getElementById("smsMessage");
const charRemaining = document.getElementById("charRemaining");
const smsCount = document.getElementById("smsCount");

textarea.addEventListener("input", function() {

    let maxLength = 500;
    let currentLength = textarea.value.length;
    let remaining = maxLength - currentLength;

    charRemaining.innerText = remaining;

    // 160 characters per SMS
    let messages = currentLength === 0 ? 0 : Math.ceil(currentLength / 160);
    smsCount.innerText = messages;
});
</script>

</body>
</html>
