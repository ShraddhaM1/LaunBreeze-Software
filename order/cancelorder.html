<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancel Order - LaunBreeze</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: #f4f6f9;
}

/* Top Info Bar */
.top-bar {
    background-color: #cfe3f1;
    color: #2c5d8a;
    text-align: center;
    padding: 10px;
    font-size: 15px;
}

/* Page Container */
.container {
    padding: 40px 60px;
}

/* Form Box */
.form-box {
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    gap: 15px;
    width: fit-content;
}

/* Label */
.label {
    font-weight: 500;
    background: #e9ecef;
    padding: 10px 15px;
    border-radius: 6px 0 0 6px;
}

/* Input */
input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 0 6px 6px 0;
    width: 250px;
    outline: none;
}

/* Button */
.btn-cancel {
    background-color: #dc3545;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

.btn-cancel:hover {
    background-color: #a71d2a;
}
</style>
</head>

<body>

<div class="top-bar">
    You have 0 pending pick up requests.
</div>

<div class="container">
    <div class="form-box">
        <div class="label">Order Number</div>
        <input type="text" placeholder="Order No">
        <button class="btn-cancel">✖ Cancel</button>
    </div>
</div>

</body>
</html>
