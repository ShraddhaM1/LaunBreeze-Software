<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunBreeze | Login</title>
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="login.css">    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="particles"></div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <div class="container">
        <div class="auth-card" id="loginCard">
            <div class="logo-section">
                <div class="logo-glow">
                    <i class="fas fa-tshirt icon-bounce"></i>
                </div>
                <h1>LaunBreeze</h1>
                <p class="subtitle typewriter">Smart Laundry Management System</p>
            </div>

            <div class="input-group">
    <div class="input-wrapper ripple-container">
        <i class="fas fa-user input-icon"></i>
        <input type="text" id="username" placeholder=" " required>
        <label for="username">Username</label>
        <div class="input-glow"></div>
    </div>
</div>

            <form id="loginForm">
                <div class="input-group">
                    <div class="input-wrapper ripple-container">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder=" " required>
                        <label for="email">Email</label>
                        <div class="input-glow"></div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper ripple-container">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder=" " required>
                        <label for="password">Password</label>
                        <span class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </span>
                        <div class="input-glow"></div>
                    </div>
                </div>

                <div class="form-options">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" id="submitBtn" class="gradient-btn">
                    <span class="btn-text">Login</span>
                    <div class="btn-loader" id="loader"></div>
                    <div class="btn-glow"></div>
                </button>

                <p class="signup-link">Don't have an account? 
                    <a href="signup.html">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
document.getElementById("submitBtn").addEventListener("click", function(e) {
    e.preventDefault(); // stop form from reloading page

    // OPTIONAL: you can add validation here later

    // Redirect to dashboard
    window.location.href = "dashboard.html";
});
</script>
</body>
</html>
