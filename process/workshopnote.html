<!DOCTYPE html>
<html>
<head>
<title>Workshop Note</title>
<style>
body { margin:0; font-family:'Inter', sans-serif; background:#f4f6f9; }
.top-bar { background:#343a40; padding:10px; text-align:center; color:white; }
.container { padding:40px 60px; }
.form-box {
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
    width:500px;
}
input, textarea, button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}
button {
    background:#343a40;
    color:white;
    border:none;
}
</style>
</head>
<body>

<div class="top-bar">Add Workshop Note</div>

<div class="container">
<div class="form-box">
<label>Order Number</label>
<input type="text" placeholder="Enter Order No">

<label>Note</label>
<textarea rows="4" placeholder="Enter workshop instructions..."></textarea>

<button>Save Note</button>
</div>
</div>

</body>
</html>
