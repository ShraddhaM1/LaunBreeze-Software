<!DOCTYPE html>
<html>
<head>
<title>Send to Workshop</title>
<style>
body { margin:0; font-family:'Inter', sans-serif; background:#f4f6f9; }
.top-bar { background:#cfe3f1; padding:10px; text-align:center; color:#2c5d8a; }
.container { padding:40px 60px; }
.form-box {
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
    width:400px;
}
input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:6px;
}
button {
    background:#28a745;
    color:white;
    border:none;
}
button:hover { background:#1e7e34; }
</style>
</head>
<body>

<div class="top-bar">Send Order to Workshop</div>

<div class="container">
<div class="form-box">
<label>Order Number</label>
<input type="text" placeholder="Enter Order No">
<button>Send</button>
</div>
</div>

</body>
</html>
