<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Send to Workshop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f3f3f3;
}

/* HEADER */
.header{
    background:#3b78a8;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header select{
    padding:6px 10px;
    border-radius:4px;
}

/* FILTER ROW */
.filters{
    padding:15px;
    display:flex;
    gap:15px;
    align-items:center;
}

input, select{
    padding:8px;
    border:1px solid #4aa3df;
    border-radius:4px;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.refresh-btn{
    background:#e6e6e6;
}

.send-btn{
    margin-left:auto;
    background:#999;
    color:white;
}

/* COUNTER */
.counter-bar{
    display:flex;
    gap:20px;
    padding:0 15px 15px 15px;
}

.counter{
    background:#7a7a7a;
    color:white;
    padding:10px 40px;
    border-radius:4px;
    font-size:20px;
}

/* MAIN SECTION */
.main{
    display:flex;
    gap:15px;
    padding:15px;
}

/* PANELS */
.panel{
    flex:1;
    background:white;
    border-radius:6px;
    border:1px solid #ccc;
    display:flex;
    flex-direction:column;
}

.panel-header{
    background:#7a7a7a;
    color:white;
    padding:8px;
}

.panel-body{
    flex:1;
    overflow-y:auto;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:8px;
    border-bottom:1px solid #eee;
    text-align:left;
}

tbody tr:nth-child(even){
    background:#f2f2f2;
}

/* MOVE SECTION */
.move-section{
    width:130px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.move-section button{
    width:70px;
    background:#b5b5b5;
    color:white;
    font-weight:bold;
}

.move-section button.primary{
    background:#4aa3df;
}

.return-btn{
    background:#e07a7a;
    width:100%;
}
</style>
</head>

<body>

<div class="header">
    <div>Send to workshop - Send garments to workshop for processing</div>
    <div>
        Order Type
        <select>
            <option>Laundry and Dry Cleaning</option>
        </select>
    </div>
</div>

<div class="filters">
    <input type="text" placeholder="Search order/barcode">
    <select>
        <option>All</option>
    </select>
    <input type="text" placeholder="Search garments of a customer">
    <input type="text" placeholder="Due date">
    <button class="refresh-btn">Refresh</button>
    <button class="send-btn">Send and Preview</button>
</div>

<div class="counter-bar">
    <div class="counter" id="leftCount">0</div>
    <div class="counter" id="rightCount">0</div>
</div>

<div class="main">

    <!-- LEFT PANEL -->
    <div class="panel">
        <div class="panel-header">Pending Garments</div>
        <div class="panel-body">
            <table>
                <tbody id="leftTable"></tbody>
            </table>
        </div>
    </div>

    <!-- MOVE SECTION -->
    <div class="move-section">
        <button class="return-btn">Return Garment</button>
        <button onclick="moveSelected()">></button>
        <button onclick="removeSelected()"><</button>
        <button class="primary" onclick="moveAll()">>></button>
        <button onclick="removeAll()"><<</button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel">
        <div class="panel-header">
            There are no pending garment to be send to workshop.
        </div>
        <div class="panel-body">
            <table>
                <tbody id="rightTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>

const garments = [
    "Order 7 - Gents Suit Shirt - Mrs Sweety Nikam",
    "Order 7 - Gents Suit Trouser - Mrs Sweety Nikam",
    "Order 7 - T Shirt - Mrs Sweety Nikam",
    "Order 8 - Shirt - Kalika Chitale",
    "Order 9 - Saree - Rahul Nikam"
];

const leftTable = document.getElementById("leftTable");
const rightTable = document.getElementById("rightTable");

function renderLeft(){
    leftTable.innerHTML="";
    garments.forEach(g=>{
        leftTable.innerHTML += `
        <tr>
            <td><input type="checkbox"></td>
            <td>${g}</td>
        </tr>
        `;
    });
    updateCount();
}

function updateCount(){
    document.getElementById("leftCount").innerText = leftTable.children.length;
    document.getElementById("rightCount").innerText = rightTable.children.length;
}

function moveSelected(){
    const selected = leftTable.querySelectorAll("input:checked");
    selected.forEach(cb=>{
        rightTable.appendChild(cb.closest("tr"));
    });
    updateCount();
}

function removeSelected(){
    const selected = rightTable.querySelectorAll("input:checked");
    selected.forEach(cb=>{
        leftTable.appendChild(cb.closest("tr"));
    });
    updateCount();
}

function moveAll(){
    const rows = leftTable.querySelectorAll("tr");
    rows.forEach(r=> rightTable.appendChild(r));
    updateCount();
}

function removeAll(){
    const rows = rightTable.querySelectorAll("tr");
    rows.forEach(r=> leftTable.appendChild(r));
    updateCount();
}

renderLeft();

</script>

</body>
</html>
